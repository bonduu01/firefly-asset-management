name: 🔥 Firefly Asset Management — Test & Allure Report

on:
  push:
    branches:
      - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Grant write permission so the workflow can publish to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    name: Run Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Python dependencies ────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      # ── 4. Install Playwright browsers ────────────────────────────────────
      - name: 🎭 Install Playwright browsers
        run: playwright install chromium --with-deps

      # ── 5. Run pytest and collect Allure results ──────────────────────────
      - name: 🧪 Run tests with Allure reporting
        run: |
          pytest tests/ -v \
            --alluredir=allure-results \
            --tb=short \
            -q
        continue-on-error: true  # Allow report generation even if tests fail

      # ── 6. Install Allure CLI ──────────────────────────────────────────────
      - name: 🔧 Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      # ── 7. Load previous Allure history (for trend charts) ────────────────
      - name: 📊 Load Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: 🗂️ Copy history into allure-results
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages-history/history" ]; then
            cp -r gh-pages-history/history allure-results/history
            echo "✅ Allure history restored from gh-pages"
          else
            echo "ℹ️ No previous history found — first run"
          fi

      # ── 8. Generate Allure HTML report ────────────────────────────────────
      - name: 📝 Generate Allure HTML report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure report generated at: allure-report/"

      # ── 9. Upload Allure report as a build artifact ───────────────────────
      - name: 📤 Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # ── 10. Upload comparison_report.json as artifact ─────────────────────
      - name: 📤 Upload JSON comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report-json
          path: reports/comparison_report.json
          retention-days: 30

      # ── 11. Deploy to GitHub Pages ────────────────────────────────────────
      - name: 🚀 Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: false
          commit_message: "ci: update Allure report for ${{ github.sha }}"

      # ── 12. Print report URL ───────────────────────────────────────────────
      - name: 🔗 Print Allure report URL
        if: always()
        run: |
          REPO="${{ github.repository }}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📊 Allure Report published!"
          echo "  🔗 URL: https://${OWNER}.github.io/${REPO_NAME}/"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
